<!DOCTYPE html>
<html lang="{{ config.meta.lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ config.meta.description }}">
    <title>{{ config.meta.title }}</title>
    <meta name="author" content="{{ config.meta.author }}">
    <link rel="canonical" href="{{ config.meta.siteUrl }}">
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <meta property="og:title" content="{{ config.meta.title }}">
    <meta property="og:description" content="{{ config.meta.description }}">
    <meta property="og:locale" content="{{ config.meta.lang }}">
    <meta name="twitter:title" content="{{ config.meta.title }}">
    <meta name="twitter:description" content="{{ config.meta.description }}">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="card">
        <div class="badge">✦ 8 de Março ✦</div>

        <header>
            <div class="avatar-wrapper">
                <img src="assets/img/picture.jpg" alt="{{ config.name }}" class="avatar">
            </div>
            <h1>{{ config.name }}</h1>
            <p class="bio">{{ config.bio }}</p>
        </header>

        <main>
            <nav class="links">
                {% for link in config.links %}
                <a class="link-item" href="{{ link.url }}" target="_blank" rel="noopener noreferrer">
                    <span class="link-deco">❀</span>
                    <span class="link-label">{{ link.name }}</span>
                    <span class="link-arrow">›</span>
                </a>
                {% endfor %}
            </nav>
        </main>

        <footer>
            <p class="message">Celebrando mulheres incríveis 🌸</p>
            <small>&copy; <span class="year"></span> {{ config.meta.author }}</small>
        </footer>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
